name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode clean package

      # Auto-generated notes only list merged PRs; this repo commits straight
      # to main, so build the changelog from commit messages instead
      - name: Generate changelog from commits
        run: |
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          {
            echo "## What's Changed"
            echo
            if [ -n "$prev" ]; then
              git log --no-merges --pretty='- %s' "$prev..${GITHUB_REF_NAME}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/$prev...${GITHUB_REF_NAME}"
            else
              git log --no-merges --pretty='- %s' "${GITHUB_REF_NAME}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}"
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/surgery-*.jar
          body_path: RELEASE_NOTES.md
